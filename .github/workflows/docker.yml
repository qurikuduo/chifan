name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:shared

      - name: Backend tests with coverage
        run: pnpm --filter @family-menu/worker test -- --coverage

      - name: Frontend tests with coverage
        run: pnpm --filter @family-menu/web test -- --coverage

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: packages/worker/coverage/
          retention-days: 14

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: packages/web/coverage/
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat packages/worker/coverage/coverage-summary.json 2>/dev/null | node -e "
            const s=require('fs').readFileSync('/dev/stdin','utf8');
            try { const d=JSON.parse(s).total;
              Object.entries(d).forEach(([k,v])=>console.log(k+': '+v.pct+'%'));
            } catch(e) { console.log('Coverage data unavailable'); }
          " >> $GITHUB_STEP_SUMMARY || echo 'Coverage data unavailable' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat packages/web/coverage/coverage-summary.json 2>/dev/null | node -e "
            const s=require('fs').readFileSync('/dev/stdin','utf8');
            try { const d=JSON.parse(s).total;
              Object.entries(d).forEach(([k,v])=>console.log(k+': '+v.pct+'%'));
            } catch(e) { console.log('Coverage data unavailable'); }
          " >> $GITHUB_STEP_SUMMARY || echo 'Coverage data unavailable' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test Docker image
        run: |
          # Start container in background
          docker run -d --name chifan-test \
            -p 8787:8787 \
            -e JWT_SECRET=ci-test-secret \
            -e ADMIN_PASSWORD=testpass123 \
            $(echo "${{ steps.meta.outputs.tags }}" | head -n1)

          # Wait for server to be ready (max 30s)
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8787/api/v1/health > /dev/null 2>&1; then
              echo "✅ Server is healthy after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Server failed to start within 30s"
              docker logs chifan-test
              exit 1
            fi
            sleep 1
          done

          # Verify health endpoint response
          HEALTH=$(curl -sf http://localhost:8787/api/v1/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || { echo "❌ Unexpected health response"; exit 1; }

          # Verify frontend static files are served
          HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" http://localhost:8787/)
          echo "Frontend HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "❌ Frontend not served (got $HTTP_CODE)"; docker logs chifan-test; exit 1; }

          echo "✅ Docker smoke test passed"
          docker stop chifan-test && docker rm chifan-test

      - name: Push Docker image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker 镜像

            ```bash
            docker pull ghcr.io/qurikuduo/chifan:${{ github.ref_name }}
            ```
